<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 — Page Not Found | Simulation & Modelling Society</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="images/logos/logo.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .error-page {
    min-height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    position: relative;
    z-index: 1;
  }

  .error-code {
    font-family: var(--font-mono);
    font-size: clamp(6rem, 20vw, 11rem);
    font-weight: 700;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(99, 179, 255, 0.25);
    letter-spacing: -0.04em;
    user-select: none;
    position: relative;
  }

  .error-code::after {
    content: '404';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px var(--accent);
    clip-path: inset(0 100% 0 0);
    animation: reveal404 1.2s cubic-bezier(0.77, 0, 0.18, 1) 0.3s forwards;
  }

  @keyframes reveal404 {
    to { clip-path: inset(0 0% 0 0); }
  }

  .error-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.9s forwards;
  }

  .error-label::before,
  .error-label::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .error-page h1 {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.05s forwards;
  }

  .error-page p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 420px;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.15s forwards;
  }

  .error-links {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.25s forwards;
  }

  .error-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Countdown bar */
  .redirect-bar {
    margin-top: 2.5rem;
    width: 200px;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.35s forwards;
  }

  .redirect-bar-fill {
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform-origin: left;
    transform: scaleX(0);
    animation: countdownFill 10s linear 1.5s forwards;
  }

  .redirect-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 1.35s forwards;
  }

  @keyframes countdownFill {
    to { transform: scaleX(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span>Simulation &amp; Modelling Society</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="resources.html">Resources</a>
    <a href="join.html">Join</a>
  </div>
</nav>

<canvas class="error-canvas" id="bgCanvas"></canvas>

<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-label">Page Not Found</div>
  <h1>This simulation doesn't exist.</h1>
  <p>The page you're looking for may have been moved, deleted, or never existed in the first place. Let's get you back on track.</p>

  <div class="error-links">
    <a href="index.html" class="btn">Return Home</a>
    <a href="projects.html" class="btn btn-outline">View Projects</a>
  </div>

  <div class="redirect-bar">
    <div class="redirect-bar-fill"></div>
  </div>
  <p class="redirect-label">Redirecting to home in 10s</p>
</div>

<script>
  // Auto-redirect after 10s
  setTimeout(() => { window.location.href = 'index.html'; }, 10000);

  // Subtle scattered particle canvas (lighter than hero)
  (function () {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const ACCENT = '99, 179, 255';
    let W, H, particles, animId;

    function rand(a, b) { return Math.random() * (b - a) + a; }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    class Particle {
      constructor() { this.reset(true); }
      reset(fresh) {
        this.x = rand(0, W);
        this.y = fresh ? rand(0, H) : rand(0, H * 0.2);
        this.vx = rand(-0.15, 0.15);
        this.vy = rand(0.04, 0.18);
        this.size = rand(0.8, 2);
        this.alpha = rand(0.1, 0.45);
        this.life = 0;
        this.maxLife = rand(350, 750);
        this.a = 0;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        this.a = this.alpha * Math.sin((this.life / this.maxLife) * Math.PI);
        if (this.life >= this.maxLife || this.y > H + 10) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ACCENT}, ${this.a})`;
        ctx.fill();
      }
    }

    function init() {
      const n = Math.round(45 * Math.min(W / 900, 1));
      particles = Array.from({ length: n }, () => new Particle());
    }

    function drawConnections() {
      const MAX = 100;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < MAX) {
            const op = (1 - d / MAX) * 0.14 * Math.min(a.a, b.a);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${ACCENT}, ${op})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawConnections();
      particles.forEach(p => { p.update(); p.draw(); });
      animId = requestAnimationFrame(loop);
    }

    resize();
    loop();

    let rt;
    window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(resize, 150); });
  })();

  // Hamburger (reuse from main.js pattern)
  (function () {
    const nav = document.querySelector('nav');
    const links = document.querySelector('.nav-links');
    if (!nav || !links) return;
    const btn = document.createElement('button');
    btn.className = 'nav-hamburger';
    btn.setAttribute('aria-label', 'Toggle navigation');
    btn.innerHTML = '<span></span><span></span><span></span>';
    nav.appendChild(btn);
    btn.addEventListener('click', () => {
      const open = links.classList.toggle('nav-open');
      btn.classList.toggle('is-open', open);
    });
    document.addEventListener('click', e => {
      if (!nav.contains(e.target)) {
        links.classList.remove('nav-open');
        btn.classList.remove('is-open');
      }
    });
  })();
</script>

</body>
</html>
